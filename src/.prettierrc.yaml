semi: false
useTabs: false
tabWidth: 2
singleQuote: false
printWidth: 100
htmlWhitespaceSensitivity: "ignore"
trailingComma: "es5"
bracketSameLine: true
quoteProps: "consistent"
bracketSpacing: true
endOfLine: "lf"
svelteStrictMode: true
plugins:
  - "prettier-plugin-svelte"
  - "prettier-plugin-tailwindcss"
